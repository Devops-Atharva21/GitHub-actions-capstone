name: Reusable Docker Build & Push

on:
  workflow_call:
   
    inputs:
      image_name:
        description: "Docker image name"
        required: true
        type: string

    secrets:
      docker_username: ${{ secerts.DOCKER_USERNAME }}
        required: true

      docker_password:
        required: true

    outputs:
      image_url:
        description: Docker image URL
        value: ${{ jobs.docker.outputs.image_url }}

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.image.outputs.image_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      - name: Generate Short SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.docker_username }}/${{ inputs.image_name }}:latest \
            -t ${{ secrets.docker_username }}/${{ inputs.image_name }}:sha-${SHORT_SHA} .
      
      - name: Debug Image Name
        run: |
          echo "Username: '${{ secrets.DOCKER_USERNAME }}'"
          echo "Image: '${{ inputs.image_name }}'"
          echo "Full Image: '${{ secrets.docker_username }}/${{ inputs.image_name }}:llatest'"


      - name: Scan Docker Image for Vulnerabilties
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: ${{ inputs.image_name }}/${{ inputs.tag }}:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
 
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.docker_username }}/${{ inputs.image_name }}:latest
        
      - name: Push SHA Image
        run: |
          docker push ${{ secrets.docker_username }}/${{ inputs.image_name }}:sha-${SHORT_SHA}

      - name: set Image URL
        id: image
        run: |
          echo "image_url=${{ secrets.docker_username }}/${{ inputs.image_name }}:latest" >> $GITHUB_OUTPUT      
