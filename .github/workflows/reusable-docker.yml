name: Reusable Docker Build & Push

on:
  workflow_call:
   
    inputs:
      image_name:
        description: "Docker image name"
        required: true
        type: string

    secrets:
      docker_username:
        required: true

      docker_password:
        required: true

    outputs:
      image_url:
        description: Docker image URL
        value: ${{ jobs.docker.outputs.image_url }}

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.image.outputs.image_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      - name: Generate Short SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.docker_username }}/${{ inputs.image_name }}:latest \
            -t ${{ secrets.docker_username }}/${{ inputs.image_name }}:sha-${SHORT_SHA} .
       
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.docker_username }}/${{ inputs.image_name }}:latest
        
      - name: Push SHA Image
        run: |
          docker push ${{ secrets.docker_username }}/${{ inputs.image_name }}:sha-${SHORT_SHA}

      - name: set Image URL
        id: image
        run: |
          echo "image_url=${{ secrets.docker_username }}/${{ inputs.image_name }}:latest" >> $GITHUB_OUTPUT      
